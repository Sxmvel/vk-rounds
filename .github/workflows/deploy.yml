name: Deploy VK Rounds ao GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    defaults:
      run:
        working-directory: ./vk-rounds

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm install

      - name: Construir o sistema (Build)
        run: npm run build

      - name: Configurar GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload dos arquivos
        uses: actions/upload-pages-artifact@v3
        with:
          path: './vk-rounds/dist'

      - name: Publicar site
        id: deployment
        uses: actions/deploy-pages@v4
